name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          A8B8FA: ${{ secrets.A8B8FA }}
          B3CD46: ${{ secrets.B3CD46 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('A8B8FA', '')
          k2 = os.environ.get('B3CD46', '')
          idx = pathlib.Path('index.html')
          txt = idx.read_text(encoding='utf-8')
          out = txt.replace('<!-- d8bd40bf2ac5d17b9aaf1305c96419d695 -->', k1) if k1 else txt
          out = out.replace('<!--  -->', k2) if k2 else out
          if out == txt and (k1 or k2):
              sys.exit(1)
          if out != txt:
              idx.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
